name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Build Docker image
    - name: Build Image
      run: docker build -t open5gs-core:latest .

    # Install kubectl
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # Install KIND
    - name: Install KIND
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    # Create cluster
    - name: Create Cluster
      run: kind create cluster

    # Load image into KIND
    - name: Load Image
      run: kind load docker-image open5gs-core:latest

    # Deploy to Kubernetes
    - name: Deploy
      run: kubectl apply -f k8s/

    # Debug
    - name: Debug Pods
      run: kubectl get pods -o wide

    - name: Wait for Pod Ready
      run: |
        kubectl get pods
        kubectl wait --for=condition=Ready pod -l app=open5gs --timeout=180s || true

    - name: Debug if Failed
      run: |
        kubectl get pods
        kubectl describe pods

    - name: Test
      run: |
        if kubectl get pods | grep -q Running
        then
          echo "PASS ✅"
        else
          echo "FAIL ❌"
          kubectl logs $(kubectl get pods -o jsonpath='{.items[0].metadata.name}')
          exit 1
        fi
